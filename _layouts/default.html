{% assign t = site.data.translations[page.lang] %}
<!DOCTYPE html>
<html lang="{{ page.lang }}">
<head>
    <!-- Google Tag Manager -->
    <!-- End Google Tag Manager -->
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Phoebe Tse, OT" /><!-- TO DO -->
    <link rel="alternate" hreflang="en" href="" /><!-- TO DO -->
    <link rel="alternate" hreflang="zh-HK" href="/zh/" /><!-- TO DO -->
    <link rel="alternate" hreflang="x-default" href="" /><!-- TO DO -->
    <link rel="icon" href="images/favicon.ico" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="css/custom.css" rel="stylesheet">
    <!-- Webfonts go here -->
    <title>{{ t.title }}</title>
</head>
<body class="{{ page.lang }}" id="top">
    <!-- Google Tag Manager (noscript) -->
    <!-- End Google Tag Manager (noscript) -->
    <header>
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">Phoebe Tse, <abbr title="Occupational Therapist">OT</abbr></a>
                <div class="collapse navbar-collapse" id="navbarNav">
                  <ul class="navbar-nav">
                     <li class="nav-item">
                        <a class="nav-link" href="#services">{{ t.services }}</a>
                     </li>
                     <li class="nav-item">
                        <a class="nav-link" href="#about">{{ t.about }}</a>
                     </li>
                     <li class="nav-item">
                        <a class="nav-link" href="#contact">{{ t.contact }}</a>
                     </li>
                  </ul>
               </div>
               <div class="d-flex">
                  <div class="dropdown d-lg-inline-block d-none">
                     <button class="btn btn-outline-secondary" lang="{{ page.lang }}">{{ t.lang_btn_text }}</button>
                  </div>
                  <button class="navbar-toggler ms-2" id="mobileNavToggle" type="button" aria-label="{{ t.mobileToggleBtnAriaLabel }}">
                  <span class="navbar-toggler-icon"></span>
                  </button>
               </div>
            </div>
         </nav>
        <a href="{{ t.lang_btn_link }}" class="lang-btn">{{ t.lang_btn_text }}</a>
    </header>

    <main>
        <h1>{{ t.title }}</h1>
        <p>{{ t.desc }}</p>
        
        <h2>{{ t.services_heading }}</h2>
        <ul>
            <li>{{ t.s1 }}</li>
            <li>{{ t.s2 }}</li>
            <li>{{ t.s3 }}</li>
        </ul>

        <a href="mailto:your-email@example.com" class="cta-button">{{ t.cta }}</a>
    </main>

</body>
</html>
